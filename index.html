<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="light" />
    <meta name="robots" content="noindex,nofollow" />
    <title>唐悠悠的成长记录</title>
    <link rel="stylesheet" href="./assets/styles.css" />
  </head>
  <body>
    <div class="topbar">
      <div class="topbar-inner">
        <button id="open-drawer" class="menu-btn" type="button" aria-label="打开导航">
          <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M5 7h14M5 12h14M5 17h14" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" />
          </svg>
        </button>
        <div id="topbar-title" class="topbar-title">唐悠悠</div>
        <div style="width: 38px"></div>
      </div>
    </div>

    <div class="drawer" id="drawer" aria-hidden="true">
      <div class="drawer-backdrop" id="drawer-backdrop"></div>
      <aside class="drawer-panel" id="drawer-panel">
        <div class="brand">
          <div class="brand-title" data-bind="brand-title">唐悠悠的成长记录</div>
          <div class="brand-subtitle" data-bind="brand-subtitle">健康和快乐是最重要的事情</div>
        </div>
        <nav class="nav" data-nav>
          <a href="#home" aria-current="true">封面 <small>01</small></a>
          <a href="#months">时间轴 <small>02</small></a>
          <a href="#milestones">里程碑 <small>03</small></a>
          <a href="#letters">爸妈信件 <small>04</small></a>
          <a href="#love">我和爱我的他们 <small>05</small></a>
        </nav>
      </aside>
    </div>

    <div class="shell">
      <aside class="sidebar">
        <div class="brand">
          <div class="brand-title" data-bind="brand-title">唐悠悠的成长记录</div>
          <div class="brand-subtitle" data-bind="brand-subtitle">健康和快乐是最重要的事情</div>
        </div>
        <nav class="nav" data-nav>
          <a href="#home" aria-current="true">封面 <small>01</small></a>
          <a href="#months">时间轴 <small>02</small></a>
          <a href="#milestones">里程碑 <small>03</small></a>
          <a href="#letters">爸妈信件 <small>04</small></a>
          <a href="#love">我和爱我的他们 <small>05</small></a>
        </nav>
      </aside>

      <main class="content">
        <div class="wrap">
          <div id="app-error" class="section-desc" style="min-height: 0; color: rgba(160, 46, 46, 0.8)"></div>

          <section id="home" class="section">
            <div class="hero">
              <div class="card hero-head">
                <h1 id="hero-title" class="hero-title">唐悠悠的成长记录</h1>
                <p id="hero-subtitle" class="hero-subtitle">健康和快乐是最重要的事情</p>
                <div id="hero-tags" class="tags" aria-label="宝宝信息"></div>
              </div>

              <div class="carousel">
                <div class="carousel-track" id="cover-track"></div>
                <div class="carousel-dots" id="cover-dots" aria-hidden="true"></div>
              </div>
            </div>
          </section>

          <section id="months" class="section">
            <h2>宝宝时间轴</h2>
            <p class="section-desc">每个月的一张纪念照。</p>
            <div id="months-timeline" class="timeline"></div>
          </section>

          <section id="milestones" class="section">
            <h2>关键里程碑</h2>
            <p class="section-desc">每一次“第一次”，都值得被认真记住。</p>
            <div id="milestones-grid" class="milestones"></div>
          </section>

          <section id="letters" class="section">
            <h2>来自爸爸妈妈的信件</h2>
            <p class="section-desc">写给你的小小记录，未来的你慢慢读。</p>
            <div id="letters-grid" class="letters"></div>
          </section>

          <section id="love" class="section">
            <h2>我和爱我的他们</h2>
            <p class="section-desc">和家人一起的温柔片段。</p>
            <div id="love-gallery" class="gallery"></div>
          </section>

          <footer class="footer">
            <div>生成时间：<span id="generated-at">—</span></div>
            <div>提示：链接分享（unlisted），不建议搜索收录。</div>
          </footer>
        </div>
      </main>
    </div>

    <div class="lightbox" id="lightbox" aria-hidden="true">
      <div class="lightbox-backdrop" id="lightbox-backdrop"></div>
      <div class="lightbox-panel" id="lightbox-panel"></div>
      <button class="lightbox-close" id="lightbox-close" type="button" aria-label="关闭">
        <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path d="M7 7l10 10M17 7 7 17" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" />
        </svg>
      </button>
    </div>

    <script type="module" src="./assets/app.js"></script>
  </body>
</html>
